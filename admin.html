<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel admin · Metodista Timóteo F.C.</title>
<link rel="icon" type="image/png" href="assets/img/logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-row">
    <div class="site-header-brand">
      <img src="assets/img/logo.png" alt="Igreja Metodista">
      <span class="name">Metodista Timóteo F.C.</span>
    </div>
    <nav class="site-header-nav">
      <a href="pedido.html">Montar pedido</a>
      <a href="meus-pedidos.html">Meus Pedidos</a>
      <a href="resumo.html">Resumo</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
    <div class="site-header-user">
      <span id="user-nome">...</span><span class="badge-admin">admin</span>
      <button class="btn btn-ghost" id="btn-sair">Sair</button>
    </div>
  </div>
</header>

<main class="site-main">
  <p class="admin-summary" id="admin-summary">Carregando pedidos...</p>

  <div class="filters">
    <input type="text" id="filtro-busca" placeholder="Buscar por nome do comprador ou da camisa...">
    <select id="filtro-status">
      <option value="">Todos os status</option>
      <option value="aguardando_pagamento">Aguardando pagamento</option>
      <option value="standby">Aguardando confirmação</option>
      <option value="pago">Pago</option>
      <option value="parcial">Parcial</option>
      <option value="cancelado">Cancelado</option>
    </select>
  </div>
  <div class="toolbar">
    <button class="btn btn-ghost btn-small" id="btn-exportar">Exportar CSV</button>
  </div>

  <div id="lista-pedidos"></div>
</main>

<div class="toast" id="toast"></div>

<script src="assets/js/vendor/supabase.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/admin.js"></script>
</body>
</html>
